<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MOE — Архитектура агентов</title>
<meta name="apple-mobile-web-app-title" content="MOE">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon-dark.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon-light-180.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08081c;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e0e0f0;height:100dvh;width:100vw;display:flex}

/* ====== HISTORY SIDEBAR ====== */
.history-sidebar{
  display:none;
  width:300px;min-width:300px;height:100dvh;
  background:rgba(8,8,28,.95);
  border-right:1px solid rgba(124,92,252,.1);
  z-index:20;
  flex-direction:column;
  overflow:hidden;
}
.history-header{
  padding:16px 18px 10px;
  border-bottom:1px solid rgba(124,92,252,.08);
  flex-shrink:0;
}
.history-header .hh-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.history-header .hh-sub{font-size:11px;color:#8888aa;margin-top:2px}
.history-body{
  flex:1;overflow-y:auto;
  padding:12px 14px;
  scrollbar-width:thin;scrollbar-color:rgba(124,92,252,.15) transparent;
}
.history-body::-webkit-scrollbar{width:4px}
.history-body::-webkit-scrollbar-track{background:transparent}
.history-body::-webkit-scrollbar-thumb{background:rgba(124,92,252,.2);border-radius:4px}
.history-item{
  display:flex;gap:10px;padding:10px 0;
  border-bottom:1px solid rgba(124,92,252,.06);
  animation:fadeSlide .4s ease both;
}
.history-item:last-child{border-bottom:none}
.hi-time{font-size:10px;color:#666;flex-shrink:0;width:38px;padding-top:2px;text-align:right}
.hi-content{flex:1;min-width:0}
.hi-flow{display:flex;align-items:center;gap:4px;font-size:12px;flex-wrap:wrap}
.hi-from,.hi-to{
  font-weight:600;font-size:11px;padding:1px 6px;border-radius:4px;
}
.hi-arrow{color:#555;font-size:10px}
.hi-task{font-size:11px;color:#aaa;margin-top:3px;line-height:1.4}
@keyframes fadeSlide{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}

/* ====== 3D SCENE ====== */
#scene-wrap{
  flex:1;height:100dvh;overflow:hidden;position:relative;
  perspective:1200px; perspective-origin:50% 40%;
}
#scene{
  width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform .1s linear;
  will-change:transform;
  position:absolute;top:0;left:0;
}

/* Agent card */
.agent-card{
  position:absolute;
  transform-style:preserve-3d;
  cursor:pointer;
  transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.agent-card:hover .agent-avatar{transform:scale(1.08)}
.agent-card.selected .agent-avatar{transform:scale(1.12)}
.agent-card.selected .agent-avatar::after{opacity:1}

/* Avatar */
.agent-avatar{
  width:62px;height:62px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:30px;
  margin:0 auto;
  position:relative;
  transition:transform .3s cubic-bezier(.4,0,.2,1),box-shadow .3s;
  will-change:transform;
}
.agent-avatar::after{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  border:2px solid var(--accent);
  opacity:0;transition:opacity .3s;
  box-shadow:0 0 16px var(--accent-shadow);
}
.agent-avatar .glow-ring{
  position:absolute;inset:-6px;border-radius:50%;
  border:1px solid var(--accent);
  opacity:0.12;
}

/* Name */
.agent-name{
  text-align:center;
  font-size:11px;font-weight:600;
  margin-top:6px;
  text-shadow:0 2px 8px rgba(0,0,0,.7);
  white-space:nowrap;
}

/* Lines (SVG overlay) */
#lines-svg{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;
  z-index:0;
}
#lines-svg line, #lines-svg path{
  stroke-width:1.5;
  fill:none;
  stroke-linecap:round;
}

/* Header */
.header{
  position:fixed;top:0;left:0;right:0;z-index:15;
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  background:linear-gradient(180deg,rgba(8,8,28,.92) 0%,transparent 100%);
  pointer-events:none;
}
.header>*{pointer-events:auto}
.back-btn{
  display:flex;align-items:center;justify-content:center;
  width:38px;height:38px;border-radius:12px;
  background:rgba(15,15,46,.8);border:1px solid rgba(124,92,252,.2);
  color:#e0e0f0;text-decoration:none;font-size:18px;
  transition:all .2s;flex-shrink:0;backdrop-filter:blur(4px);
}
.back-btn:hover{background:#14143a;border-color:#7c5cfc}
.header-title{font-size:17px;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.header-sub{font-size:11px;color:#8888aa;margin-top:1px}

/* Legend */
.legend{
  position:fixed;top:70px;right:12px;z-index:15;
  background:rgba(15,15,46,.85);border:1px solid rgba(124,92,252,.12);
  border-radius:12px;padding:10px 12px;backdrop-filter:blur(4px);
  font-size:10px;line-height:1.8;
}
.legend-item{display:flex;align-items:center;gap:6px}

/* Info panel */
.info-panel{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:15;
  background:rgba(15,15,46,.92);border:1px solid rgba(124,92,252,.2);
  border-radius:16px;padding:14px 18px;
  backdrop-filter:blur(8px);
  width:calc(100% - 32px);max-width:400px;
  transition:all .4s cubic-bezier(.4,0,.2,1);
  opacity:0;transform:translateX(-50%) translateY(20px);pointer-events:none;
}
.info-panel.visible{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.info-panel .ip-name{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.info-panel .ip-group{
  font-size:10px;padding:2px 8px;border-radius:4px;
  background:rgba(124,92,252,.15);color:#7c5cfc;
  display:inline-block;margin-top:4px;
}
.info-panel .ip-desc{font-size:12px;color:#8888aa;margin-top:6px;line-height:1.5}
.info-panel .ip-connections{font-size:11px;color:#8888aa;margin-top:6px}
.info-panel .ip-connections span{color:#10b981}

/* Hint */
.hint{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  z-index:5;font-size:11px;color:rgba(136,136,170,.3);text-align:center;
  pointer-events:none;animation:hintFade 8s forwards;
}
@keyframes hintFade{0%,70%{opacity:1}100%{opacity:0}}

/* Stars */
.stars-canvas{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;
  pointer-events:none;
}

/* Desktop sidebar */
@media (min-width:1024px){
  .history-sidebar{display:flex}
  .legend{right:16px}
}

/* Mobile adjustments */
@media (max-width:480px){
  .agent-avatar{width:50px;height:50px;font-size:24px}
  .agent-name{font-size:10px}
}
</style>
</head>
<body>

<!-- History Sidebar -->
<div class="history-sidebar" id="historySidebar">
  <div class="history-header">
    <div class="hh-title">📋 История задач</div>
    <div class="hh-sub">Кто кому что поручил</div>
  </div>
  <div class="history-body" id="historyBody"></div>
</div>

<!-- 3D Scene -->
<div id="scene-wrap">
  <canvas class="stars-canvas" id="starsCanvas"></canvas>
  <svg id="lines-svg"></svg>
  <div id="scene">
    <!-- Agents rendered by JS -->
  </div>

  <div class="header">
    <a class="back-btn" href="/">←</a>
    <div>
      <div class="header-title">🤖 Архитектура агентов</div>
      <div class="header-sub">18 агентов · Тапни для информации</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item" style="color:#7c5cfc"><span class="legend-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#7c5cfc;box-shadow:0 0 6px #7c5cfc"></span> Ядро</div>
    <div class="legend-item" style="color:#3b82f6"><span class="legend-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#3b82f6;box-shadow:0 0 6px #3b82f6"></span> Исполнители</div>
    <div class="legend-item" style="color:#10b981"><span class="legend-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#10b981;box-shadow:0 0 6px #10b981"></span> Контроль</div>
    <div class="legend-item" style="color:#f59e0b"><span class="legend-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#f59e0b;box-shadow:0 0 6px #f59e0b"></span> Результат</div>
    <div class="legend-item" style="color:#ef4444"><span class="legend-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#ef4444;box-shadow:0 0 6px #ef4444"></span> Поддержка</div>
  </div>

  <div class="hint" id="hint">👆 Тапни на агента</div>

  <div class="info-panel" id="infoPanel">
    <div>
      <div class="ip-name"><span id="ipIcon">🤖</span> <span id="ipName">agent</span></div>
      <div class="ip-group" id="ipGroup">group</div>
    </div>
    <div class="ip-desc" id="ipDesc">Описание</div>
    <div class="ip-connections" id="ipConns"></div>
  </div>
</div>

<script>
// ====== AGENT DATA ======
const AGENTS = [
  { id:'translator',  label:'Translator',  icon:'🌐', desc:'Перевод и форматирование запросов на входе', group:'core', color:'#7c5cfc', pos:[-6,0,0], conns:['planner'] },
  { id:'planner',     label:'Planner',     icon:'📋', desc:'Декомпозиция задачи на атомарные шаги', group:'core', color:'#8b7cf7', pos:[-4,0,0], conns:['analyst'] },
  { id:'analyst',     label:'Analyst',     icon:'🧠', desc:'Глубокий анализ: 6 критериев оценки плана', group:'core', color:'#9b6ef0', pos:[-2,0,0], conns:['delegator','reviewer-rev'] },
  { id:'delegator',   label:'Delegator',   icon:'🎯', desc:'Распределение задач между исполнителями', group:'core', color:'#5b6abf', pos:[0,0,0], conns:['preloader','coder','designer','data-analyst','devops','trading-analyst'] },

  { id:'preloader',   label:'Preloader',   icon:'📥', desc:'Подготовка данных и контекста перед работой', group:'worker', color:'#e17055', pos:[1.6,3.2,0], conns:['reviewer'] },
  { id:'coder',       label:'Coder',       icon:'💻', desc:'Написание кода на Python, JS, C', group:'worker', color:'#0984e3', pos:[1.6,1.8,0], conns:['reviewer','tester'] },
  { id:'designer',    label:'Designer',    icon:'🎨', desc:'UI/UX дизайн, HTML, CSS, SVG-графика', group:'worker', color:'#e84393', pos:[1.6,0.6,0], conns:['reviewer'] },
  { id:'data-analyst',label:'Data Analyst',icon:'📈', desc:'Анализ данных, метрик и статистики', group:'worker', color:'#00b894', pos:[1.6,-0.6,0], conns:['reviewer'] },
  { id:'devops',      label:'DevOps',      icon:'⚙️', desc:'Развёртывание, CI/CD, инфраструктура', group:'worker', color:'#636e72', pos:[1.6,-1.8,0], conns:['reviewer'] },
  { id:'trading-analyst', label:'Trading An.', icon:'📊', desc:'Торговые сигналы и рыночный анализ', group:'worker', color:'#fdcb6e', pos:[1.6,-3.2,0], conns:['reviewer'] },

  { id:'reviewer',    label:'Reviewer',    icon:'🔍', desc:'Контроль качества: 7 критериев, QA-петля', group:'qa', color:'#00b894', pos:[4.5,0,0], conns:['analyst-rev','reporter'] },
  { id:'tester',      label:'Tester',      icon:'🧪', desc:'Тестирование кода: синтаксис, edge cases', group:'qa', color:'#55efc4', pos:[4.5,2.5,0], conns:['reviewer'] },
  { id:'technical-writer', label:'Tech Writer', icon:'📖', desc:'Документация: README, API, changelog', group:'qa', color:'#74b9ff', pos:[4.5,-1.8,0], conns:['reviewer'] },
  { id:'security-auditor', label:'Security', icon:'🛡️', desc:'8 векторов проверки безопасности', group:'qa', color:'#d63031', pos:[4.5,-3.5,0], conns:['reviewer'] },

  { id:'reporter',    label:'Reporter',    icon:'📝', desc:'Финальное форматирование сводного отчёта', group:'output', color:'#f59e0b', pos:[7,0,0], conns:['default'] },
  { id:'default',     label:'Default',     icon:'🤖', desc:'Главный агент — финальный ответ пользователю', group:'output', color:'#dfe6e9', pos:[9,0,0], conns:[] },

  { id:'cost-tracker', label:'Cost Tracker', icon:'💰', desc:'Мониторинг расхода токенов', group:'support', color:'#fdcb6e', pos:[-3,2.5,3], conns:['delegator-feed'] },
  { id:'health-monitor', label:'Health',icon:'🩺', desc:'Проверка живых агентов, профилей, API', group:'support', color:'#55efc4', pos:[-3,-2.5,3], conns:['default-feed'] },
];

const GROUP_NAMES = { core:'Ядро пайплайна', worker:'Исполнители', qa:'Контроль качества', output:'Вывод', support:'Поддержка' };

// ====== PROJECT 3D → SCREEN COORDS ======
let sceneWidth, sceneHeight;
function getSceneSize() {
  const wrap = document.getElementById('scene-wrap');
  sceneWidth = wrap.clientWidth;
  sceneHeight = wrap.clientHeight;
}
getSceneSize();
window.addEventListener('resize', getSceneSize);

// The visual space: X from -8 to 10, Y from -4.5 to 4, Z from -3 to 3
// Scale: map this to the viewport
const VIEW_W = 18; // total width units
const VIEW_H = 9;  // total height units
const VIEW_SCALE_X = () => sceneWidth / VIEW_W;
const VIEW_SCALE_Y = () => sceneHeight / VIEW_H;
const VIEW_CENTER_X = 1; // center of scene X
const VIEW_CENTER_Y = 0; // center of scene Y

function worldToScreen(wx, wy, wz) {
  const sx = (wx - VIEW_CENTER_X) * VIEW_SCALE_X() + sceneWidth/2;
  const sy = (wy - VIEW_CENTER_Y) * VIEW_SCALE_Y() + sceneHeight/2;
  // Z affects size and position slightly (parallax)
  const zFactor = 1 + wz * 0.03; // subtle
  return { x: sx, y: sy, z: zFactor };
}

// ====== CAMERA / ROTATION ======
let rotX = 0.1, rotY = 0;
let targetRotX = 0.1, targetRotY = 0;
let isDragging = false;
let dragStart = { x:0, y:0 };
let dragLast = { x:0, y:0 };

function updateCamera() {
  const scene = document.getElementById('scene');
  // Smooth interpolation
  rotX += (targetRotX - rotX) * 0.08;
  rotY += (targetRotY - rotY) * 0.08;
  scene.style.transform = `rotateX(${rotX}rad) rotateY(${rotY}rad)`;
  requestAnimationFrame(updateCamera);
}
updateCamera();

// Drag to rotate
const wrap = document.getElementById('scene-wrap');
wrap.addEventListener('pointerdown', e => {
  if (e.target.closest('.history-sidebar') || e.target.closest('.info-panel') || e.target.closest('.header') || e.target.closest('.legend')) return;
  isDragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  dragLast = { x: e.clientX, y: e.clientY };
  wrap.setPointerCapture(e.pointerId);
});
wrap.addEventListener('pointermove', e => {
  if (!isDragging) return;
  const dx = e.clientX - dragLast.x;
  const dy = e.clientY - dragLast.y;
  dragLast = { x: e.clientX, y: e.clientY };
  targetRotY += dx * 0.005;
  targetRotX += dy * 0.005;
  targetRotX = Math.max(-0.3, Math.min(0.5, targetRotX));
});
wrap.addEventListener('pointerup', e => {
  isDragging = false;
  wrap.releasePointerCapture(e.pointerId);
});

// ====== DETECT CLICK ON AGENT ======
let selectedAgent = null;
let clickStartPos = { x:0, y:0 };
let isClickDrag = false;

wrap.addEventListener('pointerdown', e => {
  clickStartPos = { x: e.clientX, y: e.clientY };
  isClickDrag = false;
});
wrap.addEventListener('pointermove', e => {
  if (Math.abs(e.clientX - clickStartPos.x) > 5 || Math.abs(e.clientY - clickStartPos.y) > 5) isClickDrag = true;
});
wrap.addEventListener('pointerup', e => {
  if (isClickDrag) return;
  // Check if tapped on an agent card
  const el = document.elementFromPoint(e.clientX, e.clientY);
  const card = el?.closest('.agent-card');
  if (card) {
    selectAgent(card.dataset.agentId);
  } else if (!e.target.closest('.info-panel')) {
    deselectAgent();
  }
});

function selectAgent(id) {
  const a = AGENTS.find(x => x.id === id);
  if (!a) return;
  selectedAgent = id;
  // Update info panel
  document.getElementById('ipIcon').textContent = a.icon;
  document.getElementById('ipName').textContent = a.label;
  document.getElementById('ipGroup').textContent = GROUP_NAMES[a.group] || a.group;
  document.getElementById('ipDesc').textContent = a.desc;
  const conns = a.conns.filter(c => !c.endsWith('-feed'));
  const names = conns.map(c => c.replace('-rev','')).map(c => AGENTS.find(x=>x.id===c)).filter(Boolean).map(x=>x.icon+' '+x.label);
  document.getElementById('ipConns').innerHTML = names.length ? '→ <span>'+names.join('</span>, <span>')+'</span>' : '';
  document.getElementById('infoPanel').classList.add('visible');
  // Highlight
  document.querySelectorAll('.agent-card').forEach(c => c.classList.toggle('selected', c.dataset.agentId === id));
  // Dim non-selected
  document.querySelectorAll('.agent-card').forEach(c => {
    if (c.dataset.agentId !== id) c.style.opacity = '0.4';
  });
}

function deselectAgent() {
  selectedAgent = null;
  document.getElementById('infoPanel').classList.remove('visible');
  document.querySelectorAll('.agent-card').forEach(c => {
    c.classList.remove('selected');
    c.style.opacity = '1';
  });
}

// ====== RENDER AGENTS ======
function renderAgents() {
  const scene = document.getElementById('scene');
  scene.innerHTML = '';

  AGENTS.forEach(a => {
    const s = worldToScreen(a.pos[0], a.pos[1], a.pos[2]);
    // Z factor: shift based on Z depth
    const zShift = a.pos[2] * 1.2;
    const div = document.createElement('div');
    div.className = 'agent-card';
    div.dataset.agentId = a.id;
    const scale = s.z;
    // Adjust for mobile
    const avSize = window.innerWidth <= 480 ? 50 : 62;
    div.style.cssText = `
      left:${s.x}px; top:${s.y}px;
      transform:translate(-50%,-50%) scale(${scale});
      z-index:${Math.round(a.pos[2] * 10 + 50)};
    `;

    div.innerHTML = `
      <div class="agent-avatar" style="
        --accent:${a.color};
        --accent-shadow:${a.color}44;
        background:radial-gradient(circle at 35% 30%, ${lighten(a.color,25)} 0%, ${a.color} 60%, ${darken(a.color,20)} 100%);
        box-shadow:0 0 20px ${a.color}33, 0 4px 16px rgba(0,0,0,.3);
        width:${avSize}px;height:${avSize}px;font-size:${Math.round(avSize*0.48)}px;
      ">
        <div class="glow-ring"></div>
        ${a.icon}
      </div>
      <div class="agent-name">${a.label}</div>
    `;
    scene.appendChild(div);
  });

  renderLines();
  renderStars();
}

// ====== SVG LINES ======
function renderLines() {
  const svg = document.getElementById('lines-svg');
  const w = sceneWidth, h = sceneHeight;
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.innerHTML = '';

  const getPos = (id) => {
    const a = AGENTS.find(x => x.id === id);
    if (!a) return null;
    return worldToScreen(a.pos[0], a.pos[1], a.pos[2]);
  };

  AGENTS.forEach(a => {
    a.conns.forEach(t => {
      let tid = t, dashed = false;
      if (t.endsWith('-rev')) { tid = t.replace('-rev',''); dashed = true; }
      if (t.endsWith('-feed')) { tid = t.replace('-feed',''); dashed = true; }
      const pA = getPos(a.id), pB = getPos(tid);
      if (!pA || !pB) return;

      // Curve via midpoint
      const mx = (pA.x + pB.x) / 2;
      const my = (pA.y + pB.y) / 2 - 20;
      const d = `M${pA.x},${pA.y} Q${mx},${my} ${pB.x},${pB.y}`;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', d);
      path.setAttribute('stroke', a.color);
      path.setAttribute('stroke-opacity', dashed ? '0.2' : '0.3');
      if (dashed) {
        path.setAttribute('stroke-dasharray', '5,5');
        path.setAttribute('stroke-dashoffset', '3');
      }
      svg.appendChild(path);
    });
  });
}

// ====== STARS BACKGROUND ======
function renderStars() {
  const canvas = document.getElementById('starsCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = sceneWidth;
  canvas.height = sceneHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < 200; i++) {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height;
    const r = Math.random() * 1.2 + 0.3;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(136,136,170,${Math.random() * 0.3 + 0.1})`;
    ctx.fill();
  }
}

// ====== COLOR HELPERS ======
function lighten(hex, pct) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (n>>16) + pct);
  const g = Math.min(255, ((n>>8)&0xff) + pct);
  const b = Math.min(255, (n&0xff) + pct);
  return `#${((r<<16)|(g<<8)|b).toString(16).padStart(6,'0')}`;
}
function darken(hex, pct) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.max(0, (n>>16) - pct);
  const g = Math.max(0, ((n>>8)&0xff) - pct);
  const b = Math.max(0, (n&0xff) - pct);
  return `#${((r<<16)|(g<<8)|b).toString(16).padStart(6,'0')}`;
}

// ====== FLOATING ANIMATION ======
function animateFloats() {
  const cards = document.querySelectorAll('.agent-card');
  const t = Date.now() / 1000;
  cards.forEach((card, i) => {
    const id = card.dataset.agentId;
    const a = AGENTS.find(x => x.id === id);
    if (!a) return;
    const s = worldToScreen(a.pos[0], a.pos[1], a.pos[2]);
    const floatY = Math.sin(t * 0.4 + i * 0.7) * 3;
    const scale = s.z;
    card.style.transform = `translate(-50%, calc(-50% + ${floatY}px)) scale(${scale})`;
  });
  requestAnimationFrame(animateFloats);
}

function renderHistory() {
  const body = document.getElementById('historyBody');
  body.innerHTML = '';
  HISTORY.forEach(item => {
    const from = AGENTS.find(a => a.id === item.from);
    const to = AGENTS.find(a => a.id === item.to);
    if (!from || !to) return;
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `
      <div class="hi-time">${item.time}</div>

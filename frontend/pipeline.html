<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOE — Архитектура агентов</title>
<meta name="apple-mobile-web-app-title" content="MOE">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon-dark.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon-light-180.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08081c;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e0e0f0;height:100dvh;width:100vw;touch-action:none;display:flex}

/* === History Sidebar (Desktop) === */
.history-sidebar{
  display:none;
  width:300px;min-width:300px;height:100dvh;
  background:rgba(8,8,28,.95);
  border-right:1px solid rgba(124,92,252,.1);
  z-index:20;
  flex-direction:column;
  overflow:hidden;
}
.history-header{
  padding:16px 18px 10px;
  border-bottom:1px solid rgba(124,92,252,.08);
  flex-shrink:0;
}
.history-header .hh-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.history-header .hh-sub{font-size:11px;color:#8888aa;margin-top:2px}
.history-body{
  flex:1;overflow-y:auto;
  padding:12px 14px;
  scrollbar-width:thin;scrollbar-color:rgba(124,92,252,.15) transparent;
}
.history-body::-webkit-scrollbar{width:4px}
.history-body::-webkit-scrollbar-track{background:transparent}
.history-body::-webkit-scrollbar-thumb{background:rgba(124,92,252,.2);border-radius:4px}
.history-item{
  display:flex;gap:10px;padding:10px 0;
  border-bottom:1px solid rgba(124,92,252,.06);
  animation:fadeSlide .4s ease both;
}
.history-item:last-child{border-bottom:none}
.hi-time{font-size:10px;color:#666;flex-shrink:0;width:38px;padding-top:2px;text-align:right}
.hi-content{flex:1;min-width:0}
.hi-flow{display:flex;align-items:center;gap:4px;font-size:12px;flex-wrap:wrap}
.hi-from,.hi-to{
  font-weight:600;font-size:11px;padding:1px 6px;border-radius:4px;
}
.hi-arrow{color:#555;font-size:10px}
.hi-task{font-size:11px;color:#aaa;margin-top:3px;line-height:1.4}
.hi-dot{display:inline-block;width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
@keyframes fadeSlide{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}

/* === 3D Canvas === */
#canvas-wrap{
  flex:1;height:100dvh;
  position:relative;
}

/* Header overlay */
.header{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  background:linear-gradient(180deg,rgba(8,8,28,.9) 0%,transparent 100%);
  pointer-events:none;
}
.header>*{pointer-events:auto}
.back-btn{
  display:flex;align-items:center;justify-content:center;
  width:38px;height:38px;border-radius:12px;
  background:rgba(15,15,46,.8);border:1px solid rgba(124,92,252,.2);
  color:#e0e0f0;text-decoration:none;font-size:18px;
  transition:all .2s;flex-shrink:0;backdrop-filter:blur(4px);
}
.back-btn:hover{background:#14143a;border-color:#7c5cfc}
.header-title{font-size:17px;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.header-sub{font-size:11px;color:#8888aa;margin-top:1px}

/* Legend */
.legend{
  position:fixed;top:70px;right:12px;z-index:10;
  background:rgba(15,15,46,.85);border:1px solid rgba(124,92,252,.12);
  border-radius:12px;padding:10px 12px;backdrop-filter:blur(4px);
  font-size:10px;line-height:1.8;
}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 4px currentColor}

/* Info panel */
.info-panel{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:10;
  background:rgba(15,15,46,.92);border:1px solid rgba(124,92,252,.2);
  border-radius:16px;padding:14px 18px;
  backdrop-filter:blur(8px);
  width:calc(100% - 32px);max-width:400px;
  transition:all .4s cubic-bezier(.4,0,.2,1);
  opacity:0;transform:translateX(-50%) translateY(20px);pointer-events:none;
}
.info-panel.visible{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.info-panel .ip-name{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.info-panel .ip-group{font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(124,92,252,.15);color:#7c5cfc;margin-left:auto}
.info-panel .ip-desc{font-size:12px;color:#8888aa;margin-top:6px;line-height:1.5}
.info-panel .ip-connections{font-size:11px;color:#8888aa;margin-top:6px}
.info-panel .ip-connections span{color:#10b981}

/* Loading */
.loading{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:5;text-align:center;color:#8888aa;font-size:14px;
  transition:opacity .8s;
}
.loading .spinner{
  width:32px;height:32px;
  border:3px solid rgba(124,92,252,.15);border-top-color:#7c5cfc;
  border-radius:50%;animation:spin .8s linear infinite;
  margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading.hidden{opacity:0;pointer-events:none}

/* Hint */
.hint{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  z-index:5;font-size:11px;color:rgba(136,136,170,.3);text-align:center;
  pointer-events:none;animation:fadeOut 6s forwards;
}
@keyframes fadeOut{0%,70%{opacity:1}100%{opacity:0}}

/* Desktop adjustments */
@media (min-width:1024px){
  .history-sidebar{display:flex}
  .legend{right:16px}
}
</style>
</head>
<body>

<!-- History Sidebar -->
<div class="history-sidebar" id="historySidebar">
  <div class="history-header">
    <div class="hh-title">📋 История задач</div>
    <div class="hh-sub">Кто кому что поручил</div>
  </div>
  <div class="history-body" id="historyBody"></div>
</div>

<!-- 3D Container -->
<div id="canvas-wrap">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    Загрузка...
  </div>

  <div class="header">
    <a class="back-btn" href="/">←</a>
    <div>
      <div class="header-title">🤖 Архитектура агентов</div>
      <div class="header-sub">18 агентов · Тапни на агента для информации</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item" style="color:#7c5cfc"><span class="legend-dot" style="color:#7c5cfc"></span> Ядро</div>
    <div class="legend-item" style="color:#3b82f6"><span class="legend-dot" style="color:#3b82f6"></span> Исполнители</div>
    <div class="legend-item" style="color:#10b981"><span class="legend-dot" style="color:#10b981"></span> Контроль</div>
    <div class="legend-item" style="color:#f59e0b"><span class="legend-dot" style="color:#f59e0b"></span> Результат</div>
    <div class="legend-item" style="color:#ef4444"><span class="legend-dot" style="color:#ef4444"></span> Поддержка</div>
  </div>

  <div class="hint" id="hint">👆 Тапни на агента</div>

  <div class="info-panel" id="infoPanel">
    <div style="display:flex;align-items:flex-start">
      <div>
        <div class="ip-name"><span id="ipIcon">🤖</span> <span id="ipName">agent</span></div>
        <div class="ip-group" id="ipGroup">group</div>
      </div>
    </div>
    <div class="ip-desc" id="ipDesc">Описание</div>
    <div class="ip-connections" id="ipConns"></div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

document.getElementById('loading').classList.add('hidden');

// ====== AGENT DATA ======
const AGENTS = [
  { id:'translator',  label:'Translator',  icon:'🌐', desc:'Перевод и форматирование запросов на входе', group:'core', color:'#7c5cfc', pos:[-6,0,0],
    conns:['planner'] },
  { id:'planner',     label:'Planner',     icon:'📋', desc:'Декомпозиция задачи на атомарные шаги', group:'core', color:'#8b7cf7', pos:[-4,0,0],
    conns:['analyst'] },
  { id:'analyst',     label:'Analyst',     icon:'🧠', desc:'Глубокий анализ: 6 критериев оценки плана', group:'core', color:'#9b6ef0', pos:[-2,0,0],
    conns:['delegator','reviewer-rev'] },
  { id:'delegator',   label:'Delegator',   icon:'🎯', desc:'Распределение задач между исполнителями', group:'core', color:'#5b6abf', pos:[0,0,0],
    conns:['preloader','coder','designer','data-analyst','devops','trading-analyst'] },

  { id:'preloader',   label:'Preloader',   icon:'📥', desc:'Подготовка данных и контекста перед работой', group:'worker', color:'#e17055', pos:[1.6,3.2,0],
    conns:['reviewer'] },
  { id:'coder',       label:'Coder',       icon:'💻', desc:'Написание кода на Python, JS, C', group:'worker', color:'#0984e3', pos:[1.6,1.8,0],
    conns:['reviewer','tester'] },
  { id:'designer',    label:'Designer',    icon:'🎨', desc:'UI/UX дизайн, HTML, CSS, SVG-графика', group:'worker', color:'#e84393', pos:[1.6,0.6,0],
    conns:['reviewer'] },
  { id:'data-analyst',label:'Data Analyst',icon:'📈', desc:'Анализ данных, метрик и статистики', group:'worker', color:'#00b894', pos:[1.6,-0.6,0],
    conns:['reviewer'] },
  { id:'devops',      label:'DevOps',      icon:'⚙️', desc:'Развёртывание, CI/CD, инфраструктура', group:'worker', color:'#636e72', pos:[1.6,-1.8,0],
    conns:['reviewer'] },
  { id:'trading-analyst', label:'Trading An.', icon:'📊', desc:'Торговые сигналы и рыночный анализ', group:'worker', color:'#fdcb6e', pos:[1.6,-3.2,0],
    conns:['reviewer'] },

  { id:'reviewer',    label:'Reviewer',    icon:'🔍', desc:'Контроль качества: 7 критериев, QA-петля', group:'qa', color:'#00b894', pos:[4.5,0,0],
    conns:['analyst-rev','reporter'] },
  { id:'tester',      label:'Tester',      icon:'🧪', desc:'Тестирование кода: синтаксис, edge cases', group:'qa', color:'#55efc4', pos:[4.5,2.5,0],
    conns:['reviewer'] },
  { id:'technical-writer', label:'Tech Writer', icon:'📖', desc:'Документация: README, API, changelog', group:'qa', color:'#74b9ff', pos:[4.5,-1.8,0],
    conns:['reviewer'] },
  { id:'security-auditor', label:'Security', icon:'🛡️', desc:'8 векторов проверки безопасности', group:'qa', color:'#d63031', pos:[4.5,-3.5,0],
    conns:['reviewer'] },

  { id:'reporter',    label:'Reporter',    icon:'📝', desc:'Финальное форматирование сводного отчёта', group:'output', color:'#f59e0b', pos:[7,0,0],
    conns:['default'] },
  { id:'default',     label:'Default',     icon:'🤖', desc:'Главный агент — финальный ответ пользователю', group:'output', color:'#dfe6e9', pos:[9,0,0],
    conns:[] },

  { id:'cost-tracker', label:'Cost Tracker', icon:'💰', desc:'Мониторинг расхода токенов', group:'support', color:'#fdcb6e', pos:[-3,2.5,3],
    conns:['delegator-feed'] },
  { id:'health-monitor', label:'Health',icon:'🩺', desc:'Проверка живых агентов, профилей, API', group:'support', color:'#55efc4', pos:[-3,-2.5,3],
    conns:['default-feed'] },
];

const GROUP_NAMES = { core:'Ядро пайплайна', worker:'Исполнители', qa:'Контроль качества', output:'Вывод', support:'Поддержка' };

// ====== SPRITE GENERATOR ======
function createAvatarSprite(agent) {
  const size = 256;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  const cx = size/2, cy = size/2, r = size/2 - 4;

  // Glow
  const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, r+8);
  glow.addColorStop(0, hexColor(agent.color, 0.3));
  glow.addColorStop(1, hexColor(agent.color, 0));
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(cx, cy, r+8, 0, Math.PI*2); ctx.fill();

  // Gradient circle
  const grad = ctx.createRadialGradient(cx-r*0.3, cy-r*0.3, 0, cx, cy, r);
  const c = agent.color;
  grad.addColorStop(0, lighten(c, 40));
  grad.addColorStop(0.6, c);
  grad.addColorStop(1, darken(c, 30));
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();

  // Border glow
  ctx.strokeStyle = hexColor(agent.color, 0.4);
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy, r-1, 0, Math.PI*2);
  ctx.stroke();

  // Emoji
  ctx.font = '96px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 8;
  ctx.fillText(agent.icon, cx, cy-2);

  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  const mat = new THREE.SpriteMaterial({
    map: texture,
    transparent: true,
    depthTest: true,
    depthWrite: false,
    sizeAttenuation: true,
  });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(1.6, 1.6, 1);
  return sprite;
}

function hexColor(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function lighten(hex, pct) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (n>>16) + pct);
  const g = Math.min(255, ((n>>8)&0xff) + pct);
  const b = Math.min(255, (n&0xff) + pct);
  return `#${((r<<16)|(g<<8)|b).toString(16).padStart(6,'0')}`;
}
function darken(hex, pct) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.max(0, (n>>16) - pct);
  const g = Math.max(0, ((n>>8)&0xff) - pct);
  const b = Math.max(0, (n&0xff) - pct);
  return `#${((r<<16)|(g<<8)|b).toString(16).padStart(6,'0')}`;
}

// ====== NAME LABEL SPRITE ======
function createLabelSprite(name, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 512;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.font = 'bold 36px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.7)';
  ctx.shadowBlur = 6;
  ctx.fillStyle = '#ffffff';
  ctx.fillText(name, 256, 34);
  const tex = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false, sizeAttenuation: true });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(2.4, 0.3, 1);
  return sprite;
}

// ====== SCENE SETUP ======
const container = document.getElementById('canvas-wrap');
const w = container.clientWidth;
const h = container.clientHeight;

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x08081c, 20, 30);

const camera = new THREE.PerspectiveCamera(42, w/h, 0.1, 50);
camera.position.set(2, 6, 14);
camera.lookAt(1, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(w, h);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(1, 0, 0);
controls.minDistance = 4;
controls.maxDistance = 30;
controls.maxPolarAngle = Math.PI / 1.8;

// Lights
scene.add(new THREE.AmbientLight(0x222244, 0.5));
const dl = new THREE.DirectionalLight(0xffffff, 1.2);
dl.position.set(5, 10, 7); scene.add(dl);
const pl = new THREE.PointLight(0x7c5cfc, 0.8, 25);
pl.position.set(1, 0, 0); scene.add(pl);
scene.add(new THREE.DirectionalLight(0x7c5cfc, 0.3).setPosition(-5, -3, -5));

// Stars
const starGeo = new THREE.BufferGeometry();
const starP = new Float32Array(2500*3);
for(let i=0;i<2500*3;i++) starP[i]=(Math.random()-0.5)*70;
starGeo.setAttribute('position', new THREE.BufferAttribute(starP, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0x8888aa,size:0.03,transparent:true,opacity:0.5})));

// Ground grid
const g = new THREE.GridHelper(22, 22, 0x7c5cfc, 0x7c5cfc);
g.position.y = -0.6;
g.material.transparent = true; g.material.opacity = 0.06;
scene.add(g);

// ====== CREATE AGENT NODES ======
const agentMeshes = {};
const agentInfo = {};

AGENTS.forEach(a => {
  const group = new THREE.Group();
  group.position.set(a.pos[0], a.pos[1], a.pos[2]);

  // Avatar sprite
  const avatar = createAvatarSprite(a);
  group.add(avatar);

  // Name label
  const label = createLabelSprite(a.label, a.color);
  label.position.y = -1.1;
  group.add(label);

  // Click hitbox (invisible larger sphere for raycasting)
  const hit = new THREE.Mesh(
    new THREE.SphereGeometry(0.65, 8, 8),
    new THREE.MeshBasicMaterial({ visible: false })
  );
  hit.userData.isHitbox = true;
  group.add(hit);

  scene.add(group);
  agentMeshes[a.id] = group;
  agentInfo[a.id] = a;
});

// ====== CONNECTION LINES ======
const posMap = {};
AGENTS.forEach(a => { posMap[a.id] = new THREE.Vector3(a.pos[0], a.pos[1], a.pos[2]); });
const lineMat = (c, d) => new THREE.LineBasicMaterial({ color: c, transparent: true, opacity: d ? 0.15 : 0.25 });

AGENTS.forEach(a => {
  a.conns.forEach(t => {
    let tid = t, dashed = false;
    if (t.endsWith('-rev')) { tid = t.replace('-rev',''); dashed = true; }
    if (t.endsWith('-feed')) { tid = t.replace('-feed',''); dashed = true; }
    if (!posMap[tid]) return;
    const pA = posMap[a.id], pB = posMap[tid];
    const mid = new THREE.Vector3((pA.x+pB.x)/2, (pA.y+pB.y)/2+0.4, (pA.z+pB.z)/2);
    const curve = new THREE.QuadraticBezierCurve3(pA, mid, pB);
    const pts = curve.getPoints(24);
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = dashed
      ? new THREE.LineDashedMaterial({ color: a.color, dashSize: 0.08, gapSize: 0.06, transparent: true, opacity: 0.2 })
      : lineMat(a.color);
    const line = new THREE.Line(geo, mat);
    if (dashed) line.computeLineDistances();
    scene.add(line);
  });
});

// ====== FLOATING ANIMATION DATA ======
AGENTS.forEach(a => {
  const m = agentMeshes[a.id];
  if (!m) return;
  m.userData.baseY = a.pos[1];
  m.userData.phase = Math.random() * Math.PI * 2;
});

// ====== CLICK / RAYCAST ======
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let selectedAgent = null;
let downPos = { x:0, y:0 };
let isDrag = false;

renderer.domElement.addEventListener('pointerdown', e => {
  downPos = { x: e.clientX, y: e.clientY };
  isDrag = false;
});
renderer.domElement.addEventListener('pointermove', e => {
  if (Math.abs(e.clientX - downPos.x) > 5 || Math.abs(e.clientY - downPos.y) > 5) isDrag = true;
});
renderer.domElement.addEventListener('pointerup', e => {
  if (isDrag) return;
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);

  const hits = raycaster.intersectObjects(scene.children, true);
  let found = null;
  for (const hit of hits) {
    let obj = hit.object;
    while (obj) {
      for (const [id, mesh] of Object.entries(agentMeshes)) {
        if (mesh === obj || (mesh.children.includes(obj) && obj.userData.isHitbox)) {
          found = id;
          break;
        }
      }
      if (found) break;
      obj = obj.parent;
    }
    if (found) break;
  }
  if (found) selectAgent(found);
  else deselectAgent();
});

function selectAgent(id) {
  const a = AGENTS.find(x => x.id === id);
  if (!a) return;
  selectedAgent = id;
  const panel = document.getElementById('infoPanel');
  document.getElementById('ipIcon').textContent = a.icon;
  document.getElementById('ipName').textContent = a.label;
  document.getElementById('ipGroup').textContent = GROUP_NAMES[a.group] || a.group;
  document.getElementById('ipDesc').textContent = a.desc;
  const conns = a.conns.filter(c => !c.endsWith('-feed'));
  const names = conns.map(c => c.replace('-rev','')).map(c => AGENTS.find(x=>x.id===c)).filter(Boolean).map(x=>x.icon+' '+x.label);
  document.getElementById('ipConns').innerHTML = names.length ? '→ <span>'+names.join('</span>, <span>')+'</span>' : '';
  panel.classList.add('visible');

  // Highlight
  AGENTS.forEach(x => { const m=agentMeshes[x.id]; if(m) m.children.forEach(c => { if(c.isSprite) c.material.opacity = x.id===id ? 1 : 0.5; }); });
}

function deselectAgent() {
  selectedAgent = null;
  document.getElementById('infoPanel').classList.remove('visible');
  AGENTS.forEach(x => { const m=agentMeshes[x.id]; if(m) m.children.forEach(c => { if(c.isSprite) c.material.opacity = 1; }); });
}

function renderHistory() {
  const body = document.getElementById('historyBody');
  body.innerHTML = '';
  HISTORY_TEMPLATE.forEach(item => {
    const from = AGENTS.find(a => a.id === item.from);
    const to = AGENTS.find(a => a.id === item.to);
    if (!from || !to) return;
    const div = document.createElement('div');
    div.className = 'history-item';
    const color = from.color;
    div.innerHTML = `
      <div class="hi-time">${item.time}</div>
      <div class="hi-content">
        <div class="hi-flow">
          <span class="hi-from" style="background:${color}33;color:${color}">${from.icon} ${from.label}</span>
          <span class="hi-arrow">→</span>
          <span class="hi-to" style="background:${to.color}33;color:${to.color}">${to.icon} ${to.label}</span>
        </div>
        <div class="hi-task">${item.task}</div>
      </div>
    `;
    body.appendChild(div);
  });
}
renderHistory();

// ====== RESIZE ======
window.addEventListener('resize', () => {
  const w2 = container.clientWidth;
  const h2 = container.clientHeight;
  if (w2 === 0 || h2 === 0) return;
  camera.aspect = w2 / h2;
  camera.updateProjectionMatrix();
  renderer.setSize(w2, h2);
});

// ====== ANIMATION LOOP ======
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  AGENTS.forEach(a => {
    const m = agentMeshes[a.id];
    if (!m || !m.userData) return;
    m.position.y = m.userData.baseY + Math.sin(t * 0.5 + m.userData.phase) * 0.06;
    // Gentle rotation of avatar
    m.children.forEach(c => {
      if (c.isSprite) c.material.rotation = t * 0.02;
    });
  });
  controls.update();
  renderer.render(scene, camera);
}
animate();

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOE — Архитектура агентов</title>
<meta name="apple-mobile-web-app-title" content="MOE">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon-dark.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon-light-180.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08081c;overflow-x:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e0e0f0;min-height:100vh;padding:12px}
.container{max-width:900px;margin:0 auto}

/* Header */
.header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.back-btn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:12px;background:rgba(15,15,46,.8);border:1px solid rgba(124,92,252,.2);color:#e0e0f0;text-decoration:none;font-size:18px;flex-shrink:0}
.back-btn:hover{background:#14143a;border-color:#7c5cfc}
.header-title{font-size:18px;font-weight:700}
.header-sub{font-size:11px;color:#8888aa;margin-top:2px}

/* Legend */
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;font-size:11px}
.legend-item{display:flex;align-items:center;gap:6px;background:rgba(15,15,46,.6);padding:4px 10px;border-radius:8px;border:1px solid rgba(124,92,252,.1)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Pipeline stages */
.pipeline{display:flex;flex-direction:column;gap:24px;margin-bottom:24px}

.stage-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.stage-title .badge{font-size:10px;padding:2px 8px;border-radius:6px;color:#fff}

.agents-row{display:flex;flex-wrap:wrap;gap:10px}
.agent-card{
  background:rgba(15,15,46,.8);border:1px solid rgba(124,92,252,.12);
  border-radius:14px;padding:14px 16px;cursor:pointer;
  display:flex;align-items:center;gap:10px;
  transition:all .2s;min-width:140px;flex:1 0 auto;max-width:200px;
  user-select:none;-webkit-tap-highlight-color:transparent;
}
.agent-card:hover{background:#14143a;border-color:var(--color);transform:translateY(-2px)}
.agent-card.selected{background:#14143a;border-color:var(--color);box-shadow:0 0 20px var(--color)33}
.agent-avatar{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  box-shadow:0 0 12px var(--color)33;
}
.agent-info{flex:1;min-width:0}
.agent-name{font-size:13px;font-weight:700}
.agent-desc{font-size:10px;color:#8888aa;margin-top:2px}
.agent-conns{font-size:9px;color:#666;margin-top:2px}
.agent-conns span{display:inline-block;margin-right:2px}

/* Connection arrows between rows */
.arrow-row{display:flex;justify-content:center;padding:2px 0}
.arrow-row svg{width:120px;height:24px}

/* Info panel */
.info-panel{
  position:fixed;bottom:16px;left:16px;right:16px;z-index:10;
  background:rgba(15,15,46,.95);border:1px solid rgba(124,92,252,.2);
  border-radius:16px;padding:16px;max-width:500px;margin:0 auto;
  transition:all .4s cubic-bezier(.4,0,.2,1);
  opacity:0;transform:translateY(20px);pointer-events:none;
}
.info-panel.visible{opacity:1;transform:translateY(0);pointer-events:auto}
.info-panel .ip-name{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.info-panel .ip-group{font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(124,92,252,.15);color:#7c5cfc;display:inline-block;margin-top:4px}
.info-panel .ip-desc{font-size:12px;color:#8888aa;margin-top:6px;line-height:1.5}
.info-panel .ip-conns{font-size:11px;color:#8888aa;margin-top:6px}
.info-panel .ip-conns span{color:#10b981}

/* History sidebar (desktop) */
.history-section{margin-top:20px}
.history-section h3{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.history-group{
  background:rgba(15,15,46,.6);border:1px solid rgba(124,92,252,.1);
  border-radius:12px;margin-bottom:8px;overflow:hidden;cursor:pointer;
}
.hg-header{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  transition:background .15s;user-select:none;
}
.hg-header:hover{background:rgba(124,92,252,.06)}
.hg-time{font-size:10px;color:#666;flex-shrink:0;width:36px}
.hg-title{font-size:12px;font-weight:600;flex:1}
.hg-count{font-size:9px;color:#8888aa;background:rgba(124,92,252,.1);padding:2px 6px;border-radius:4px}
.hg-toggle{color:#7c5cfc;font-size:10px;transition:transform .2s;flex-shrink:0}
.history-group.open .hg-toggle{transform:rotate(180deg)}
.hg-body{display:none;padding:8px 14px 12px;border-top:1px solid rgba(124,92,252,.06)}
.history-group.open .hg-body{display:block}
.hg-item{display:flex;gap:8px;padding:4px 0;font-size:11px}
.hg-item .hgi-time{font-size:9px;color:#666;width:30px;flex-shrink:0;padding-top:1px}
.hg-item .hgi-desc{color:#aaa;line-height:1.4}
.hgi-flow{display:inline-flex;align-items:center;gap:3px;margin-right:4px}
.hgi-flow .from,.hgi-flow .to{font-weight:600;font-size:10px;padding:0 4px;border-radius:3px}
.hgi-arrow{color:#555;font-size:8px}

/* Desktop layout */
@media(min-width:769px){
  body{padding:20px}
  .pipeline{flex-direction:row;flex-wrap:wrap;align-items:flex-start}
  .stage{flex:0 0 auto;margin-bottom:0;display:flex;flex-direction:column;align-items:center}
  .agents-row{flex-direction:column;align-items:stretch}
  .agent-card{max-width:220px}
  .arrow-row{transform:rotate(-90deg);padding:10px 0}
  .layout-row{display:flex;gap:24px;align-items:flex-start}
  .main-content{flex:1}
  .history-section{width:300px;flex-shrink:0;margin-top:0}
}

@media(min-width:1024px){
  .layout-row{display:flex;gap:24px;align-items:flex-start}
}
</style>
</head>
<body>
<div class="container">

<!-- Header -->
<div class="header">
  <a class="back-btn" href="/">←</a>
  <div>
    <div class="header-title">🤖 Архитектура агентов</div>
    <div class="header-sub">18 агентов · 5 уровней · Тапни для информации</div>
  </div>
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-item"><span class="legend-dot" style="background:#7c5cfc;box-shadow:0 0 6px #7c5cfc"></span> Ядро</div>
  <div class="legend-item"><span class="legend-dot" style="background:#3b82f6;box-shadow:0 0 6px #3b82f6"></span> Исполнители</div>
  <div class="legend-item"><span class="legend-dot" style="background:#10b981;box-shadow:0 0 6px #10b981"></span> Контроль</div>
  <div class="legend-item"><span class="legend-dot" style="background:#f59e0b;box-shadow:0 0 6px #f59e0b"></span> Результат</div>
  <div class="legend-item"><span class="legend-dot" style="background:#ef4444;box-shadow:0 0 6px #ef4444"></span> Поддержка</div>
</div>

<div class="layout-row">
  <div class="main-content">
    <div class="pipeline" id="pipeline"></div>
  </div>

  <!-- History (desktop sidebar) -->
  <div class="history-section" id="historySection">
    <h3>📋 История задач</h3>
    <div id="historyBody"></div>
  </div>
</div>

<!-- Info panel -->
<div class="info-panel" id="infoPanel">
  <div class="ip-name"><span id="ipIcon">🤖</span> <span id="ipName">agent</span></div>
  <div class="ip-group" id="ipGroup">group</div>
  <div class="ip-desc" id="ipDesc">Описание</div>
  <div class="ip-conns" id="ipConns"></div>
</div>

</div><!-- container -->

<script>
const AGENTS = [
  { id:'translator',  label:'Translator',  icon:'🌐', desc:'Перевод и форматирование запросов', group:'core', color:'#7c5cfc', conns:['planner'] },
  { id:'planner',     label:'Planner',     icon:'📋', desc:'Декомпозиция на атомарные шаги', group:'core', color:'#8b7cf7', conns:['analyst'] },
  { id:'analyst',     label:'Analyst',     icon:'🧠', desc:'6 критериев оценки плана', group:'core', color:'#9b6ef0', conns:['delegator','reviewer-rev'] },
  { id:'delegator',   label:'Delegator',   icon:'🎯', desc:'Распределение задач', group:'core', color:'#5b6abf', conns:['preloader','coder','designer','data-analyst','devops','trading-analyst'] },

  { id:'preloader',   label:'Preloader',   icon:'📥', desc:'Подготовка данных и контекста', group:'worker', color:'#e17055', conns:['reviewer'] },
  { id:'coder',       label:'Coder',       icon:'💻', desc:'Написание кода Python, JS, C', group:'worker', color:'#0984e3', conns:['reviewer','tester'] },
  { id:'designer',    label:'Designer',    icon:'🎨', desc:'UI/UX дизайн, HTML, CSS', group:'worker', color:'#e84393', conns:['reviewer'] },
  { id:'data-analyst',label:'Data Analyst',icon:'📈', desc:'Анализ данных и метрик', group:'worker', color:'#00b894', conns:['reviewer'] },
  { id:'devops',      label:'DevOps',      icon:'⚙️', desc:'CI/CD, инфраструктура', group:'worker', color:'#636e72', conns:['reviewer'] },
  { id:'trading-analyst', label:'Trading', icon:'📊', desc:'Торговые сигналы', group:'worker', color:'#fdcb6e', conns:['reviewer'] },

  { id:'reviewer',    label:'Reviewer',    icon:'🔍', desc:'7 критериев QA-петли', group:'qa', color:'#00b894', conns:['analyst-rev','reporter'] },
  { id:'tester',      label:'Tester',      icon:'🧪', desc:'Тестирование кода', group:'qa', color:'#55efc4', conns:['reviewer'] },
  { id:'technical-writer', label:'Tech Writer', icon:'📖', desc:'Документация', group:'qa', color:'#74b9ff', conns:['reviewer'] },
  { id:'security-auditor', label:'Security', icon:'🛡️', desc:'8 векторов безопасности', group:'qa', color:'#d63031', conns:['reviewer'] },

  { id:'reporter',    label:'Reporter',    icon:'📝', desc:'Финальный отчёт', group:'output', color:'#f59e0b', conns:['default'] },
  { id:'default',     label:'Default',     icon:'🤖', desc:'Ответ пользователю', group:'output', color:'#dfe6e9', conns:[] },

  { id:'cost-tracker', label:'Cost', icon:'💰', desc:'Мониторинг токенов', group:'support', color:'#fdcb6e', conns:[] },
  { id:'health-monitor', label:'Health', icon:'🩺', desc:'Проверка агентов', group:'support', color:'#55efc4', conns:[] },
];

const GROUP_ORDER = ['core','worker','qa','output','support'];
const GROUP_LABELS = { core:'🔮 Ядро пайплайна', worker:'⚡ Исполнители', qa:'🔍 Контроль качества', output:'📤 Результат', support:'🔧 Поддержка' };

function lighten(hex,pct){const n=parseInt(hex.slice(1),16);return `#${(Math.min(255,(n>>16)+pct)<<16|Math.min(255,((n>>8)&0xff)+pct)<<8|Math.min(255,(n&0xff)+pct)).toString(16).padStart(6,'0')}`}

function renderPipeline() {
  const container = document.getElementById('pipeline');
  container.innerHTML = '';

  GROUP_ORDER.forEach((g, gi) => {
    const agents = AGENTS.filter(a => a.group === g);
    if (!agents.length) return;

    const stage = document.createElement('div');
    stage.className = 'stage';
    stage.style.cssText = 'flex:1;min-width:160px';

    // Arrow from previous stage (except first)
    let arrowHTML = '';
    if (gi > 0) {
      arrowHTML = `<div class="arrow-row"><svg viewBox="0 0 120 24"><path d="M10,12 L100,12" stroke="rgba(124,92,252,0.2)" stroke-width="2" fill="none"/><polygon points="110,12 100,6 100,18" fill="rgba(124,92,252,0.3)"/></svg></div>`;
    }

    let cardsHTML = '';
    agents.forEach(a => {
      const connText = a.conns
        .filter(c => !c.endsWith('-rev') && !c.endsWith('-feed'))
        .map(c => c.replace('-rev',''))
        .map(c => { const t=AGENTS.find(x=>x.id===c); return t ? t.icon : '' })
        .join('');

      cardsHTML += `
        <div class="agent-card" data-id="${a.id}" style="--color:${a.color}" onclick="selectAgent('${a.id}')">
          <div class="agent-avatar" style="background:radial-gradient(circle at 35% 30%, ${lighten(a.color,25)} 0%, ${a.color} 60%, ${darken(a.color,20)} 100%); box-shadow:0 0 12px ${a.color}44">
            ${a.icon}
          </div>
          <div class="agent-info">
            <div class="agent-name">${a.label}</div>
            <div class="agent-desc">${a.desc}</div>
            ${connText ? '<div class="agent-conns">→ <span>'+connText+'</span></div>' : ''}
          </div>
        </div>`;
    });

    stage.innerHTML = `
      <div class="stage-title">
        <span class="badge" style="background:${agents[0].color}22;color:${agents[0].color}">${agents.length}</span>
        ${GROUP_LABELS[g] || g}
      </div>
      ${arrowHTML}
      <div class="agents-row">${cardsHTML}</div>
    `;
    container.appendChild(stage);
  });
}

function darken(hex,pct){const n=parseInt(hex.slice(1),16);return `#${(Math.max(0,(n>>16)-pct)<<16|Math.max(0,((n>>8)&0xff)-pct)<<8|Math.max(0,(n&0xff)-pct)).toString(16).padStart(6,'0')}`}

// Selection
function selectAgent(id) {
  const a = AGENTS.find(x => x.id === id);
  if (!a) return;
  document.querySelectorAll('.agent-card').forEach(c => c.classList.toggle('selected', c.dataset.id === id));
  document.getElementById('ipIcon').textContent = a.icon;
  document.getElementById('ipName').textContent = a.label;
  document.getElementById('ipGroup').textContent = GROUP_LABELS[a.group] || a.group;
  document.getElementById('ipDesc').textContent = a.desc;
  const conns = a.conns.filter(c => !c.endsWith('-rev') && !c.endsWith('-feed'));
  const names = conns.map(c => c.replace('-rev','')).map(c => AGENTS.find(x=>x.id===c)).filter(Boolean).map(x=>x.icon+' '+x.label);
  document.getElementById('ipConns').innerHTML = names.length ? '→ <span>'+names.join('</span>, <span>')+'</span>' : '';
  document.getElementById('infoPanel').classList.add('visible');
}

// Close panel on tap outside
document.addEventListener('click', e => {
  if (!e.target.closest('.agent-card') && !e.target.closest('.info-panel')) {
    document.getElementById('infoPanel').classList.remove('visible');
    document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('selected'));
  }
});

// History
const HISTORY_GROUPS = [{
  id:'chatbot', time:'10:15', title:'🤖 Создание Telegram чат-бота', count:15, items:[
    {time:'10:15', from:'translator', to:'planner', task:'Разбить задачу на шаги'},
    {time:'10:17', from:'planner', to:'analyst', task:'Проверить план на полноту'},
    {time:'10:19', from:'analyst', to:'delegator', task:'План ✅. Распределить'},
    {time:'10:22', from:'delegator', to:'coder', task:'FastAPI /start, /help'},
    {time:'10:22', from:'delegator', to:'designer', task:'UI приветствия'},
    {time:'10:25', from:'coder', to:'tester', task:'Проверить импорты'},
    {time:'10:26', from:'tester', to:'coder', task:'❌ missing import'},
    {time:'10:27', from:'coder', to:'tester', task:'Исправлено'},
    {time:'10:28', from:'tester', to:'reviewer', task:'✅ Код ок'},
    {time:'10:30', from:'reviewer', to:'analyst', task:'Всё готово'},
    {time:'10:31', from:'analyst', to:'reporter', task:'✅ Формируй отчёт'},
    {time:'10:32', from:'reporter', to:'default', task:'Отчёт готов'},
    {time:'10:33', from:'default', to:'☀️ Пользователь', task:'Готово! 🚀'},
  ]},{
  id:'backtest', time:'14:00', title:'📊 Настройка бэктестера', count:9, items:[
    {time:'14:00', from:'translator', to:'planner', task:'Стратегия → план'},
    {time:'14:04', from:'analyst', to:'delegator', task:'План ✅'},
    {time:'14:06', from:'delegator', to:'coder', task:'RSI-backtester'},
    {time:'14:12', from:'coder', to:'tester', task:'Проверить RSI'},
    {time:'14:18', from:'tester', to:'reviewer', task:'✅ Расчёты верны'},
  ]},
];

function renderHistory() {
  const body = document.getElementById('historyBody');
  body.innerHTML = '';
  HISTORY_GROUPS.forEach(g => {
    const agentIds = [...new Set(g.items.flatMap(i => [i.from, i.to]).filter(x => x !== '☀️ Пользователь'))];
    const icons = agentIds.slice(0,3).map(id => { const a=AGENTS.find(x=>x.id===id); return a?a.icon:''; });
    const div = document.createElement('div');
    div.className = 'history-group';
    div.innerHTML = `
      <div class="hg-header" onclick="toggleHistory('${g.id}')">
        <div class="hg-time">${g.time}</div>
        <div class="hg-title">${g.title}</div>
        <div style="display:flex;gap:2px">${icons.map(ic=>'<span style="font-size:11px">'+ic+'</span>').join('')}</div>
        <span class="hg-count">${g.count}</span>
        <span class="hg-toggle">▼</span>
      </div>
      <div class="hg-body">
        ${g.items.map(item => {
          const from = AGENTS.find(a => a.id === item.from);
          const to = AGENTS.find(a => a.id === item.to);
          if (!from || !to) return '';
          return `<div class="hg-item">
            <div class="hgi-time">${item.time}</div>
            <div class="hgi-desc">
              <span class="hgi-flow">
                <span class="from" style="background:${from.color}33;color:${from.color}">${from.icon}</span>
                <span class="hgi-arrow">→</span>
                <span class="to" style="background:${to.color}33;color:${to.color}">${to.icon}</span>
              </span>
              ${item.task}
            </div>
          </div>`;
        }).join('')}
      </div>`;
    body.appendChild(div);
  });
}
window.toggleHistory = function(id) {
  const g = document.querySelector(`.history-group:nth-child(${HISTORY_GROUPS.findIndex(x=>x.id===id)+1})`);
  if (g) {
    // Close all others
    document.querySelectorAll('.history-group').forEach(h => { if (h !== g) h.classList.remove('open'); });
    g.classList.toggle('open');
  }
};

renderPipeline();
renderHistory();
</script>
</body>
</html>
